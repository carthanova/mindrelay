<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindRelay — Your AI memory across every platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d1a;
      color: #c8c8d8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .badge {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .gradient {
      background: linear-gradient(90deg, #7c6af7, #4285f4, #10a37f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub {
      font-size: 18px;
      color: #666;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }
    .chip {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid #252535;
      color: #888;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #7c6af7, #4285f4);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .secondary {
      font-size: 13px;
      color: #333;
    }
    .secondary a { color: #444; }
    footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: #2a2a3a;
    }
    footer a { color: #333; text-decoration: none; }
  </style>
</head>
<body>
  <div class="badge">
    <svg width="64" height="64" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 0.5L17.5 9L9 17.5L0.5 9Z" fill="url(#mr_hero)"/>
      <defs><linearGradient id="mr_hero" x1="0.5" y1="0.5" x2="17.5" y2="17.5" gradientUnits="userSpaceOnUse"><stop stop-color="#9d8ff5"/><stop offset="1" stop-color="#4285f4"/></linearGradient></defs>
    </svg>
  </div>
  <h1>Mind<span class="gradient">Relay</span></h1>
  <p class="sub">Your AI memory across every platform. Switch between Claude, ChatGPT, Gemini, and Grok — your context follows you.</p>

  <div class="chips">
    <span class="chip">Claude</span>
    <span class="chip">ChatGPT</span>
    <span class="chip">Gemini</span>
    <span class="chip">Grok</span>
    <span class="chip">100% Local</span>
    <span class="chip">No Account</span>
  </div>

  <a class="cta" href="https://github.com/carthanova/mindrelay" target="_blank">
    View on GitHub
  </a>
  <p class="secondary">Chrome Web Store listing coming soon</p>

  <a href="https://buymeacoffee.com/carthanova" target="_blank" style="display:inline-block;margin-top:20px;">
    <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height:40px;border-radius:8px;" />
  </a>

  <footer>
    <a href="privacy-policy.html">Privacy Policy</a>
  </footer>
</body>
</html>
